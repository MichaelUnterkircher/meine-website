<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}
.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.hidden { display:none !important; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
  cursor:pointer;
  width: 100%;
}
button:active { background: #1b5e20; }

.table-wrapper { overflow-x:auto; margin-top: 15px; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:800px;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}
.entnommen-done { background:#e8f5e9; color: black; }

input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing: border-box;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  z-index:1000;
  width:90%;
  max-width:400px;
}

.marker {
  position:absolute;
  width:12px;
  height:12px;
  background: red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:2px solid white;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h2>Abschussliste Jagdrevier Prad</h2>
<div style="text-align:center; margin-bottom: 15px;">Zahlencode: 1024</div>
<img src="491438944_10226782024328158_4391837002889702168_n.jpg" alt="Logo" style="width:180px;display:block;margin:auto;border-radius:10px;">
<div class="topbar" style="margin-top:20px;">
<button onclick="zeigeSeite('park')">Park</button>
<button onclick="zeigeSeite('revier')">Revier</button>
</div>
</div>

<div id="park" class="hidden">
<h2>Park</h2>
<p>noch nicht aktiv</p>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<div id="revier" class="hidden">
<div class="topbar">
<button onclick="startNeu()">➕ Neuer Eintrag</button>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>
<div class="table-wrapper">
<table id="tabelle"></table>
</div>
</div>

<div id="name" class="hidden">
<h3>Name Erleger</h3>
<input id="inputName" placeholder="Name eingeben...">
<button onclick="nextWild()">Weiter</button>
<button onclick="zeigeSeite('revier')">⬅ Zurück</button>
</div>

<div id="wild" class="hidden">
<h3>Wildart</h3>
<button onclick="zeigeSeite('reh')">Rehwild</button>
<button onclick="zeigeSeite('hirsch')">Rotwild</button>
<button onclick="zeigeSeite('gams')">Gamswild</button>
<button onclick="setWild('Fuchs')">Fuchs</button>
<button onclick="setWild('Hase')">Hase</button>
<button onclick="zeigeSeite('andere')">Andere</button>
<button onclick="zeigeSeite('name')">⬅ Zurück</button>
</div>

<div id="reh" class="hidden">
<h3>Rehwild</h3>
<button onclick="setWildDetail('Rehwild','T-Bock')">T-Bock</button>
<button onclick="setWildDetail('Rehwild','J-Bock')">J-Bock</button>
<button onclick="setWildDetail('Rehwild','Geiß')">Geiß</button>
<button onclick="setWildDetail('Rehwild','Schmalgeiß')">Schmalgeiß</button>
<button onclick="setWildDetail('Rehwild','Kitz')">Kitz</button>
<button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="hirsch" class="hidden">
<h3>Rotwild</h3>
<button onclick="setWildDetail('Rotwild','T-Hirsch')">T-Hirsch</button>
<button onclick="setWildDetail('Rotwild','J-Hirsch')">J-Hirsch</button>
<button onclick="setWildDetail('Rotwild','Tier')">Tier</button>
<button onclick="setWildDetail('Rotwild','Schmaltier')">Schmaltier</button>
<button onclick="setWildDetail('Rotwild','Kalb')">Kalb</button>
<button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="gams" class="hidden">
<h3>Gamswild</h3>
<button onclick="setWildDetail('Gamswild','Bock')">Bock</button>
<button onclick="setWildDetail('Gamswild','Geiß')">Geiß</button>
<button onclick="setWildDetail('Gamswild','Jahrling')">Jahrling</button>
<button onclick="setWildDetail('Gamswild','Kitz')">Kitz</button>
<button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="andere" class="hidden">
<h3>Andere Wildart</h3>
<input id="andereInput" placeholder="Wildart eingeben...">
<button onclick="setAndere()">Weiter</button>
<button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="gewicht" class="hidden">
<h3>Gewicht (kg)</h3>
<select id="inputGewicht" onchange="autoGewicht()">
    <option value="">Bitte wählen...</option>
</select>
<button onclick="nextOrt()">Weiter</button>
<button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="ort" class="hidden">
<h3>Örtlichkeit</h3>
<button onclick="setOrt('Prad')">Prad (Karte wählen)</button>
<button onclick="zeigeAndereOrt()">Andere (Text)</button>
<div id="andereOrtBox" class="hidden">
<input id="inputOrt" placeholder="Ort eingeben">
<button onclick="setAndereOrt()">Bestätigen</button>
</div>
<button onclick="zeigeSeite('gewicht')" style="background:#666; margin-top:20px;">⬅ Zurück</button>
</div>

<div id="zeit" class="hidden">
<h3>Schusszeit</h3>
<input type="time" id="inputZeit">
<button onclick="nextDatum()">Weiter</button>
<button onclick="zeigeSeite('ort')">⬅ Zurück</button>
</div>

<div id="datum" class="hidden">
<h3>Eingelagert Datum</h3>
<input type="date" id="inputDatum">
<button onclick="nextVerwendung()">Weiter</button>
<button onclick="zeigeSeite('zeit')">⬅ Zurück</button>
</div>

<div id="verwendung" class="hidden">
<h3>Verwendung</h3>
<button onclick="finish('Eigengebrauch')">Eigengebrauch</button>
<button onclick="finish('Verkauf')">Verkauf</button>
<button onclick="zeigeSeite('datum')">⬅ Zurück</button>
</div>

</div>

<!-- Karte Popup -->
<div id="mapPopup" class="popup hidden">
<h3>Punkt auf Karte wählen</h3>
<div style="position:relative; overflow: hidden; border:1px solid #000;">
  <img id="mapImage" src="https://raw.githubusercontent.com/MichaelUnterkircher/meine-website/main/Revier2.png" style="width:100%; cursor:crosshair;" onclick="mapClick(event)">
  <div id="mapMarker" class="marker hidden"></div>
</div>
<p style="font-size: 11px; color: #666;">Tippe auf den Erlegungsort</p>
<button onclick="confirmMap()">OK</button>
<button onclick="closeMap()" style="background:#666;">Abbrechen</button>
</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let tempCoords = null;

// Gewicht-Optionen füllen
const gewichtSelect = document.getElementById("inputGewicht");
for(let i=1; i<=200; i++){
  let opt = document.createElement("option");
  opt.value = i;
  opt.text = i + " kg";
  gewichtSelect.appendChild(opt);
}

function zeigeSeite(id){
  document.querySelectorAll(".container > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  if(id === 'revier') renderTabelle();
}

function startNeu() {
  e = { id: Date.now(), entnommen: false };
  document.getElementById("inputName").value = "";
  document.getElementById("andereInput").value = "";
  document.getElementById("inputOrt").value = "";
  document.getElementById("inputZeit").value = "";
  document.getElementById("inputDatum").value = new Date().toISOString().split('T')[0];
  zeigeSeite('name');
}

function nextWild(){
  let v = document.getElementById("inputName").value.trim();
  if(!v) return alert("Bitte Name eingeben!");
  e.name = v;
  zeigeSeite("wild");
}

function setWild(w){
  e.wildart = w;
  e.wild = "-";
  if(w === "Fuchs" || w === "Hase"){
    e.gewicht = "0";
    zeigeSeite("ort");
  } else {
    zeigeSeite("gewicht");
  }
}

function setWildDetail(a, d){
  e.wildart = a;
  e.wild = d;
  zeigeSeite("gewicht");
}

function setAndere(){
  let v = document.getElementById("andereInput").value.trim();
  if(!v) return alert("Bitte Wildart eingeben!");
  e.wildart = v;
  e.wild = "-";
  zeigeSeite("gewicht");
}

function autoGewicht(){
  if(gewichtSelect.value) nextOrt();
}

function nextOrt(){
  e.gewicht = gewichtSelect.value;
  zeigeSeite("ort");
}

function setOrt(o){
  if(o === "Prad") {
    document.getElementById("mapPopup").classList.remove("hidden");
  } else {
    e.ort = o;
    zeigeSeite("zeit");
  }
}

function mapClick(ev) {
  const rect = ev.target.getBoundingClientRect();
  const x = (ev.clientX - rect.left) / rect.width * 100;
  const y = (ev.clientY - rect.top) / rect.height * 100;
  tempCoords = { x, y };
  const marker = document.getElementById("mapMarker");
  marker.style.left = x + "%";
  marker.style.top = y + "%";
  marker.classList.remove("hidden");
}

function confirmMap() {
  if(!tempCoords) return alert("Bitte Punkt wählen!");
  e.ort = "Prad (Karte)";
  e.coords = tempCoords;
  closeMap();
  zeigeSeite("zeit");
}

function closeMap() {
  document.getElementById("mapPopup").classList.add("hidden");
}

function zeigeAndereOrt(){
  document.getElementById("andereOrtBox").classList.remove("hidden");
}

function setAndereOrt(){
  let v = document.getElementById("inputOrt").value.trim();
  if(!v) return alert("Bitte Ort eingeben!");
  e.ort = v;
  zeigeSeite("zeit");
}

function nextDatum(){
  let v = document.getElementById("inputZeit").value;
  if(!v) return alert("Bitte Schusszeit wählen!");
  e.zeit = v;
  zeigeSeite("datum");
}

function nextVerwendung(){
  let v = document.getElementById("inputDatum").value;
  if(!v) return alert("Bitte Datum wählen!");
  e.datum = v;
  zeigeSeite("verwendung");
}

function finish(verwendung){
  e.verwendung = verwendung;
  daten.push(e);
  speichern();
  zeigeSeite("revier");
}

function speichern(){
  localStorage.setItem("daten", JSON.stringify(daten));
}

function toggleEntnommen(id) {
  let index = daten.findIndex(item => item.id === id);
  if(index !== -1) {
    daten[index].entnommen = !daten[index].entnommen;
    speichern();
    renderTabelle();
  }
}

function renderTabelle(){
  let html = `<tr>
    <th>Erleger</th>
    <th>Wildart</th>
    <th>Detail</th>
    <th>kg</th>
    <th>Ort</th>
    <th>Zeit</th>
    <th>Datum</th>
    <th>Verwendung</th>
    <th>Status</th>
  </tr>`;
  
  daten.slice().reverse().forEach(d => {
    html += `<tr>
      <td>${d.name}</td>
      <td>${d.wildart}</td>
      <td>${d.wild}</td>
      <td>${d.gewicht}</td>
      <td>${d.ort}</td>
      <td>${d.zeit}</td>
      <td>${d.datum}</td>
      <td>${d.verwendung}</td>
      <td>
        <button class="entnommen-btn ${d.entnommen ? 'entnommen-done' : ''}" 
                onclick="toggleEntnommen(${d.id})">
          ${d.entnommen ? '✔' : 'Offen'}
        </button>
      </td>
    </tr>`;
  });
  document.getElementById("tabelle").innerHTML = html;
}

// Initialisierung
renderTabelle();
</script>
</body>
</html>
