<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}

.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}

.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:1000px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done { background:#e8f5e9; }

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.link {
  color:blue;
  text-decoration:underline;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div>Zahlencode: 1024</div>

  <div class="topbar">
    <button onclick="zeigeSeite('revier')">Revier</button>
  </div>
</div>

<!-- REVIER -->
<div id="revier" class="hidden">
  <div class="topbar">
    <button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <div class="table-wrapper">
    <table id="tabelle"></table>
  </div>
</div>

<!-- NAME -->
<div id="name" class="hidden">
  <h3>Name Erleger</h3>
  <input id="inputName">
  <button onclick="nextWild()">Weiter</button>
  <button onclick="zeigeSeite('revier')">⬅ Zurück</button>
</div>

<!-- WILD -->
<div id="wild" class="hidden">
  <h3>Wildart</h3>
  <button onclick="zeigeSeite('reh')">Rehwild</button>
  <button onclick="zeigeSeite('hirsch')">Rotwild</button>
  <button onclick="zeigeSeite('gams')">Gamswild</button>
  <button onclick="setWild('Wildschwein','Wildschwein')">Wildschwein</button>
  <button onclick="setWild('Hase','Hase')">Hase</button>
  <button onclick="zeigeSeite('andere')">Andere</button>
  <button onclick="zeigeSeite('name')">⬅ Zurück</button>
</div>

<!-- REH -->
<div id="reh" class="hidden">
  <h3>Rehwild</h3>
  <button onclick="setWild('Rehwild','T-Bock')">T-Bock</button>
  <button onclick="setWild('Rehwild','J-Bock')">J-Bock</button>
  <button onclick="setWild('Rehwild','Geiß')">Geiß</button>
  <button onclick="setWild('Rehwild','Schmalgeiß')">Schmalgeiß</button>
  <button onclick="setWild('Rehwild','Kitz')">Kitz</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<!-- HIRSCH -->
<div id="hirsch" class="hidden">
  <h3>Rotwild</h3>
  <button onclick="setWild('Rotwild','T-Hirsch')">T-Hirsch</button>
  <button onclick="setWild('Rotwild','J-Hirsch')">J-Hirsch</button>
  <button onclick="setWild('Rotwild','Tier')">Tier</button>
  <button onclick="setWild('Rotwild','Schmaltier')">Schmaltier</button>
  <button onclick="setWild('Rotwild','Kalb')">Kalb</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<!-- GAMS -->
<div id="gams" class="hidden">
  <h3>Gamswild</h3>
  <button onclick="setWild('Gamswild','Bock')">Bock</button>
  <button onclick="setWild('Gamswild','Geiß')">Geiß</button>
  <button onclick="setWild('Gamswild','Jahrling')">Jahrling</button>
  <button onclick="setWild('Gamswild','Kitz')">Kitz</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<!-- ANDERE -->
<div id="andere" class="hidden">
  <h3>Andere Wildart</h3>
  <input id="andereInput">
  <button onclick="setAndere()">Weiter</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<!-- GEWICHT -->
<div id="gewicht" class="hidden">
  <h3>Gewicht (kg)</h3>
  <select id="inputGewicht"></select>
  <button onclick="nextOrt()">Weiter</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<!-- ORT -->
<div id="ort" class="hidden">
  <h3>Örtlichkeit</h3>
  <button onclick="openMaps()">Prad</button>
  <button onclick="zeigeAndereOrt()">Andere</button>

  <div id="andereOrtBox" class="hidden">
    <input id="inputOrt" placeholder="Koordinaten oder Maps-Link einfügen">
    <button onclick="setOrt()">Weiter</button>
  </div>

  <button onclick="zeigeSeite('gewicht')">⬅ Zurück</button>
</div>

</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};

/* Gewicht */
for(let i=0;i<=200;i++){
  let opt=document.createElement("option");
  opt.value=i;
  opt.text=i+" kg";
  inputGewicht.appendChild(opt);
}

function speichern(){
  localStorage.setItem("daten", JSON.stringify(daten));
}

function zeigeSeite(id){
  document.querySelectorAll("div[id]").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function nextWild(){
  let v=inputName.value.trim();
  if(!v) return alert("Bitte Name eingeben!");
  e.name=v;
  zeigeSeite("wild");
}

function setWild(a,d){
  e.wildart=a;
  e.wild=d;
  zeigeSeite("gewicht");
}

function setAndere(){
  let v=andereInput.value.trim();
  if(!v) return alert("Bitte Wildart eingeben!");
  e.wildart="Andere";
  e.wild=v;
  zeigeSeite("gewicht");
}

function nextOrt(){
  e.gewicht=inputGewicht.value;
  zeigeSeite("ort");
}

/* Maps öffnen */
function openMaps(){
  window.open("https://www.google.com/maps","_blank");
  document.getElementById("andereOrtBox").classList.remove("hidden");
}

function zeigeAndereOrt(){
  document.getElementById("andereOrtBox").classList.remove("hidden");
}

/* Koordinaten erkennen */
function extractCoords(input){
  let m=input.match(/(-?\d+\.\d+)[, ]+(-?\d+\.\d+)/);
  if(m) return {lat:m[1],lng:m[2]};

  m=input.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:m[1],lng:m[2]};

  return null;
}

function setOrt(){
  let v=inputOrt.value.trim();
  if(!v) return alert("Bitte Ort eingeben!");

  let coords=extractCoords(v);

  if(coords){
    e.lat=coords.lat;
    e.lng=coords.lng;
    e.ort="Koordinaten";
  } else {
    e.ort=v;
  }

  daten.push(e);
  speichern();
  anzeigen();
  e={};

  zeigeSeite("revier");
}

function mapsLink(lat,lng){
  return `https://www.google.com/maps?q=${lat},${lng}`;
}

function anzeigen(){
  let t=document.getElementById("tabelle");
  t.innerHTML=`
  <tr>
  <th>Name</th><th>Wildart</th><th>Wild</th><th>kg</th><th>Ort</th>
  </tr>`;

  daten.forEach(d=>{
    let r=t.insertRow();
    r.insertCell(0).innerText=d.name;
    r.insertCell(1).innerText=d.wildart;
    r.insertCell(2).innerText=d.wild;
    r.insertCell(3).innerText=d.gewicht;

    let ort=r.insertCell(4);

    if(d.lat){
      ort.innerHTML=`<span class="link" onclick="window.open('${mapsLink(d.lat,d.lng)}')">📍 Karte öffnen</span>`;
    } else {
      ort.innerText=d.ort;
    }
  });
}

anzeigen();
</script>

</body>
</html>
