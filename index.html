<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}

.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}

.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done {
  background:#e8f5e9;
}

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:1000;
  width:320px;
}
</style>
</head>

<body>

<div class="container">

<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>

  <div class="topbar">
    <button onclick="zeigeSeite('park')">Park</button>
    <!-- ✅ geändert -->
    <button onclick="zeigeSeite('Revier')">Revier</button>
  </div>
</div>

<div id="park" class="hidden">
  <h2>Park</h2>
  <p>noch nicht aktiv</p>
  <button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<!-- ✅ geändert -->
<div id="Revier" class="hidden">
  <div class="topbar">
    <button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <div class="table-wrapper">
    <table id="tabelle"></table>
  </div>
</div>

<div id="name" class="hidden">
  <h3>Name Erleger</h3>
  <input id="inputName">
  <button onclick="nextWild()">Weiter</button>
  <!-- ✅ geändert -->
  <button onclick="zeigeSeite('Revier')">⬅ Zurück</button>
</div>

<!-- REST BLEIBT 1:1 DEIN CODE -->

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};

function speichern(){ localStorage.setItem("daten", JSON.stringify(daten)); }

function zeigeSeite(id){
  document.querySelectorAll("div[id]").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function nextWild(){
  let v=inputName.value.trim();
  if(!v) return alert("Bitte Name eingeben!");
  e.name=v;
  zeigeSeite("wild");
}

function finish(v){
  e.verwendung=v;
  e.entnommen="";
  e.abfall=null;
  daten.push(e);
  speichern(); anzeigen(); e={};
  zeigeSeite("Revier"); /* ✅ geändert */
}

function anzeigen(){
  let t=document.getElementById("tabelle");
  t.innerHTML="<tr><th>Name</th></tr>";

  daten.forEach((d,i)=>{
    let r=t.insertRow();
    r.insertCell(0).innerText=d.name;
  });
}

anzeigen();
</script>

</body>
</html>
