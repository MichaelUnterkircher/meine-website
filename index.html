<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abschussliste</title>

  <!-- Wichtig für Handy -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #2e7d32;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-sizing: border-box;
    }

    h2 {
      margin-bottom: 5px;
      font-size: 20px;
    }

    .info {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div class="info">Zahlencode: 1024</div>

  <input type="text" id="name" placeholder="Name">
  <input type="date" id="datum">
  <input type="text" id="tier" placeholder="Tier">

  <button onclick="speichern()">Speichern</button>
</div>

<script>
function speichern() {
  let name = document.getElementById("name").value;
  let datum = document.getElementById("datum").value;
  let tier = document.getElementById("tier").value;

  alert("Gespeichert:\n" + name + " | " + datum + " | " + tier);
}
</script>

</body>
</html>
