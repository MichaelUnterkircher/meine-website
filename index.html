<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abschussliste</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #2e7d32;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
    }

    .info {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    img {
      width: 180px;
      border-radius: 15px;
      margin: 10px 0;
    }

    .button-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .button-container button {
      flex: 1;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }

    .hidden {
      display: none;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 5px;
    }

    th {
      background: #2e7d32;
      color: white;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div class="info">Zahlencode: 1024</div>

  <img src="491438944_10226782024328158_4391837002889702168_n.jpg" alt="Logo">

  <div class="button-container">
    <button onclick="zeigePark()">Park</button>
    <button onclick="zeigeRevier()">Revier</button>
  </div>

  <!-- Park Nachricht -->
  <div id="park" class="message hidden">
    noch nicht aktiv
  </div>

  <!-- Tabelle -->
  <div id="revier" class="hidden">
    <table>
      <tr>
        <th>Name</th>
        <th>Wildart</th>
        <th>Gewicht</th>
        <th>Ort</th>
        <th>Zeit</th>
        <th>Eingelagert</th>
        <th>Entnommen</th>
        <th>Eigengebrauch</th>
        <th>Verkauf</th>
        <th>Abfall</th>
      </tr>
    </table>
  </div>

</div>

<script>
function zeigePark() {
  document.getElementById("park").classList.remove("hidden");
  document.getElementById("revier").classList.add("hidden");
}

function zeigeRevier() {
  document.getElementById("revier").classList.remove("hidden");
  document.getElementById("park").classList.add("hidden");
}
</script>

</body>
</html>
