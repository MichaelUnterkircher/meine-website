<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* (alles unverändert) */
body { margin:0; font-family: Arial; background:#2e7d32; display:flex; justify-content:center; padding:10px; }
.container { background:white; padding:15px; border-radius:15px; width:100%; max-width:600px; }
.hidden { display:none; }
.topbar { display:flex; gap:10px; margin-bottom:10px; }
.topbar button { flex:1; }
button { padding:12px; margin:5px 0; border:none; border-radius:10px; background:#2e7d32; color:white; font-size:16px; }
.table-wrapper { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:950px; }
th,td { border:1px solid #ccc; padding:5px; text-align:center; }
th { background:#2e7d32; color:white; }
.entnommen-btn { background:red; color:white; border-radius:6px; padding:4px 8px; cursor:pointer; font-weight:bold; }
.entnommen-done { background:#e8f5e9; }
.abfall-btn { background:blue; color:white; border-radius:6px; padding:4px 8px; cursor:pointer; font-weight:bold; }
.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }
input, select { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
.popup { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:1000; width:320px; }
.marker { position:absolute; width:5px; height:5px; border-radius:50%; transform:translate(-50%,-50%); border:1px solid black; }
</style>
</head>

<body>
<div class="container">

<!-- (dein kompletter HTML bleibt unverändert) -->

</div>

<!-- Karte -->
<div id="mapPopup" class="popup hidden">
<h3>Karte Prad</h3>
<div style="position:relative;">
  <img id="mapImage" src="https://raw.githubusercontent.com/MichaelUnterkircher/meine-website/main/Revier2.png" style="width:100%;cursor:crosshair;">
</div>
<button onclick="closeMap()">OK</button>
</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let aktuellerPunkt = null;
let mapMode = "input";

/* ======== ALLES WIE BEI DIR ======== */

/* TABELLE FIX */
function anzeigen(){
 let t=document.getElementById("tabelle");
 t.innerHTML=`<tr>
 <th>Name</th><th>Wildart</th><th>Wild</th><th>kg</th><th>Ort</th>
 <th>Schusszeit</th><th>Eingelagert</th><th>Entnommen</th>
 <th>Verwendung</th><th>Abfall</th></tr>`;

 daten.forEach((d,i)=>{
 let r=t.insertRow();
 r.insertCell(0).innerText=d.name;
 r.insertCell(1).innerText=d.wildart;
 r.insertCell(2).innerText=d.wild;
 r.insertCell(3).innerText=d.gewicht;

 if(d.ort==="Prad" && d.koord){
  r.insertCell(4).innerHTML=`<span style="color:blue;cursor:pointer;" onclick="openMapFromTable(${i})">Prad (Karte)</span>`;
 } else {
  r.insertCell(4).innerText=d.ort;
 }

 r.insertCell(5).innerText=d.zeit;
 r.insertCell(6).innerText=formatDatum(d.datum);

 let ent=r.insertCell(7);
 if(!d.entnommen){
  ent.innerHTML=`<span class="entnommen-btn" onclick="openDate(${i})">+</span>
  <input type="date" id="date${i}" style="display:none;" onchange="setEntnommen(${i},this.value)">`;
 } else {
  ent.innerText=formatDatum(d.entnommen);
 }

 r.insertCell(8).innerText=d.verwendung;

 let ab=r.insertCell(9);
 if(d.abfall===null){
  ab.innerHTML=`<span class="abfall-btn" onclick="handleAbfall(${i})">+</span>`;
 } else {
  ab.innerText=d.abfall;
 }
 });
}

/* FORMAT FIX */
function formatDatum(d){
 if(!d) return "";
 let date=new Date(d);
 return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${date.getFullYear()}`;
}

/* POPUP FIX */
function handleAbfall(i){
 let box=document.createElement("div");
 box.className="popup";
 box.innerHTML=`ACHTUNG!<br><br>
 Abfall nur während Parkjagd<br><br>
 <button onclick="setAbfall(${i},'bezahlt')">Ja</button>
 <button onclick="setAbfall(${i},'nein')">Nein</button>`;
 document.body.appendChild(box);
}

/* ======== KARTE (UNVERÄNDERT) ======== */
function drawMarker(x,y,wildart){
 let container=document.getElementById("mapImage").parentElement;
 let marker=document.createElement("div");
 marker.className="marker";
 marker.style.background="blue";
 marker.style.left=x+"px";
 marker.style.top=y+"px";
 container.querySelectorAll(".marker").forEach(m=>m.remove());
 container.appendChild(marker);
}

document.getElementById("mapImage").addEventListener("click",function(ev){
 let rect=this.getBoundingClientRect();
 let x=ev.clientX-rect.left;
 let y=ev.clientY-rect.top;
 aktuellerPunkt={x:Math.round(x),y:Math.round(y)};
 drawMarker(x,y,e.wildart);
});

anzeigen();
</script>

</body>
</html>
