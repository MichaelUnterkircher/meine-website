<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #2e7d32;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

.hidden { display: none; }

.topbar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.topbar button {
  flex: 1;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2e7d32;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1b5e20;
}

img {
  width: 180px;
  border-radius: 15px;
  margin: 10px auto;
  display: block;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: left;
}

th {
  background: #2e7d32;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start">
  <h2 style="text-align:center;">Abschussliste Jagdrevier Prad</h2>
  <div style="text-align:center;">Zahlencode: 1024</div>

  <img src="491438944_10226782024328158_4391837002889702168_n.jpg">

  <div class="topbar">
    <button onclick="zeigeSeite('park')">Park</button>
    <button onclick="zeigeSeite('revier')">Revier</button>
  </div>
</div>

<!-- PARK -->
<div id="park" class="hidden">
  <h2>Park</h2>
  <p>noch nicht aktiv</p>
  <button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<!-- REVIER -->
<div id="revier" class="hidden">

  <!-- OBEN -->
  <div class="topbar">
    <button onclick="zeigeSeite('eingabeName')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <!-- TABELLE -->
  <table id="tabelle">
    <tr>
      <th>Name</th>
      <th>Wildart</th>
    </tr>
  </table>

</div>

<!-- NAME -->
<div id="eingabeName" class="hidden">
  <h2>Name Erleger</h2>
  <input type="text" id="name">
  <button onclick="weiterZuWildart()">Weiter</button>
</div>

<!-- WILDART -->
<div id="eingabeWildart" class="hidden">
  <h2>Wildart</h2>

  <button onclick="setWild('Reh')">Reh</button>
  <button onclick="setWild('Hirsch')">Hirsch</button>
  <button onclick="setWild('Gams')">Gams</button>
  <button onclick="setWild('Fuchs')">Fuchs</button>
</div>

</div>

<script>
let eintrag = {};

function zeigeSeite(seite) {
  let seiten = ["start","park","revier","eingabeName","eingabeWildart"];
  seiten.forEach(s => document.getElementById(s).classList.add("hidden"));
  document.getElementById(seite).classList.remove("hidden");
}

function weiterZuWildart() {
  let name = document.getElementById("name").value;
  if(name === "") {
    alert("Bitte Name eingeben");
    return;
  }

  eintrag.name = name;
  zeigeSeite("eingabeWildart");
}

function setWild(wildart) {
  eintrag.wildart = wildart;

  // Tabelle erweitern
  let tabelle = document.getElementById("tabelle");
  let row = tabelle.insertRow();
  row.insertCell(0).innerText = eintrag.name;
  row.insertCell(1).innerText = eintrag.wildart;

  // zurücksetzen
  eintrag = {};
  document.getElementById("name").value = "";

  zeigeSeite("revier");
}
</script>

</body>
</html>
