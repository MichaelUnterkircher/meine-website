<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 350px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    img {
      width: 250px;
      border-radius: 15px;
      margin-top: 15px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #3a8dde;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Meine Website</h1>
    <p>Willkommen auf meiner Seite!</p>

    <img src="491438944_10226782024328158_4391837002889702168_n.jpg" alt="Mein Bild">

    <br>

    <button onclick="zeigeText()">Klick mich</button>

    <p id="text"></p>
  </div>

  <script>
    function zeigeText() {
      document.getElementById("text").innerText = "🔥 Du hast den Button geklickt!";
    }
  </script>

</body>
</html>
