<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste Jagdrevier Prad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS & JS für die Karte -->
<link rel="stylesheet" href="https://unpkg.com" />
<script src="https://unpkg.com"></script>

<style>
body { margin:0; font-family: Arial; background:#2e7d32; display:flex; justify-content:center; padding:10px; }
.container { background:white; padding:15px; border-radius:15px; width:100%; max-width:800px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.hidden { display:none; }
.topbar { display:flex; gap:10px; margin-bottom:10px; }
.topbar button { flex:1; }
button { padding:12px; margin:5px 0; border:none; border-radius:10px; background:#2e7d32; color:white; font-size:16px; cursor:pointer; width:100%; }
.table-wrapper { overflow-x:auto; margin-top:15px; }
table { width:100%; border-collapse:collapse; font-size:12px; min-width:1000px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
th { background:#2e7d32; color:white; }
.entnommen-btn { background:red; padding:6px; font-size:11px; }
.entnommen-done { background:#e8f5e9; color: green; font-weight: bold; }
.abfall-btn { padding:6px; font-size:11px; }
.abfall-ja { background:#4caf50; }
.abfall-nein { background:#f44336; }
.abfall-grau { background:#ccc; color: #333; }
input, select { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box; }

/* Karten-Popup Styling */
#mapContainer {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 90%; height: 80%; background: white; z-index: 2000;
  border-radius: 15px; padding: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
#map { width: 100%; height: calc(100% - 60px); border-radius: 10px; }
.popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1500; }
.map-link { color: #1976d2; text-decoration: underline; cursor: pointer; font-weight: bold; }
</style>
</head>

<body>

<div class="container">

  <!-- STARTSEITE -->
  <div id="start">
    <h2 style="text-align:center">Abschussliste Jagdrevier Prad</h2>
    <div style="text-align:center; margin-bottom:10px;">Zahlencode: 1024</div>
    <div class="topbar">
      <button onclick="zeigeSeite('park')">Park</button>
      <button onclick="zeigeSeite('revier')">Revier</button>
    </div>
  </div>

  <!-- PARK -->
  <div id="park" class="hidden">
    <h2>Park</h2>
    <p>noch nicht aktiv</p>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <!-- REVIER / TABELLE -->
  <div id="revier" class="hidden">
    <div class="topbar">
      <button onclick="neuerEintrag()">➕ Neuer Eintrag</button>
      <button onclick="zeigeSeite('start')">⬅ Zurück</button>
    </div>
    <div class="table-wrapper">
      <table id="tabelle"></table>
    </div>
  </div>

  <!-- FORMULAR SCHRITTE -->
  <div id="name" class="hidden">
    <h3>Name Erleger</h3>
    <input id="inputName" placeholder="Dein Name">
    <button onclick="nextWild()">Weiter</button>
    <button onclick="zeigeSeite('revier')">⬅ Zurück</button>
  </div>

  <div id="wild" class="hidden">
    <h3>Wildart</h3>
    <button onclick="zeigeSeite('reh')">Rehwild</button>
    <button onclick="zeigeSeite('hirsch')">Rotwild</button>
    <button onclick="zeigeSeite('gams')">Gamswild</button>
    <button onclick="setWild('Wildschwein')">Wildschwein</button>
    <button onclick="setWild('Hase')">Hase</button>
    <button onclick="zeigeSeite('andere')">Andere</button>
    <button onclick="zeigeSeite('name')">⬅ Zurück</button>
  </div>

  <div id="reh" class="hidden">
    <h3>Rehwild</h3>
    <button onclick="setWildDetail('Rehwild','T-Bock')">T-Bock</button>
    <button onclick="setWildDetail('Rehwild','J-Bock')">J-Bock</button>
    <button onclick="setWildDetail('Rehwild','Geiß')">Geiß</button>
    <button onclick="setWildDetail('Rehwild','Schmalgeiß')">Schmalgeiß</button>
    <button onclick="setWildDetail('Rehwild','Kitz')">Kitz</button>
    <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
  </div>

  <div id="hirsch" class="hidden">
    <h3>Rotwild</h3>
    <button onclick="setWildDetail('Rotwild','T-Hirsch')">T-Hirsch</button>
    <button onclick="setWildDetail('Rotwild','J-Hirsch')">J-Hirsch</button>
    <button onclick="setWildDetail('Rotwild','Tier')">Tier</button>
    <button onclick="setWildDetail('Rotwild','Schmaltier')">Schmaltier</button>
    <button onclick="setWildDetail('Rotwild','Kalb')">Kalb</button>
    <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
  </div>

  <div id="gams" class="hidden">
    <h3>Gamswild</h3>
    <button onclick="setWildDetail('Gamswild','Bock')">Bock</button>
    <button onclick="setWildDetail('Gamswild','Geiß')">Geiß</button>
    <button onclick="setWildDetail('Gamswild','Jahrling')">Jahrling</button>
    <button onclick="setWildDetail('Gamswild','Kitz')">Kitz</button>
    <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
  </div>

  <div id="andere" class="hidden">
    <h3>Andere Wildart</h3>
    <input id="andereInput" placeholder="Wildart eingeben">
    <button onclick="setAndere()">Weiter</button>
    <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
  </div>

  <div id="gewicht" class="hidden">
    <h3>Gewicht (kg)</h3>
    <select id="inputGewicht"></select>
    <button onclick="nextOrt()">Weiter</button>
    <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
  </div>

  <div id="ort" class="hidden">
    <h3>Örtlichkeit</h3>
    <button onclick="openMapPicker()" style="background:#1565c0">📍 Ort auf Karte wählen</button>
    <button onclick="setOrt('Prad')">Ort: Prad</button>
    <button onclick="zeigeAndereOrt()">Text eingeben</button>
    <div id="andereOrtBox" class="hidden">
      <input id="inputOrt" placeholder="Ort Name">
      <button onclick="setAndereOrt()">OK</button>
    </div>
    <button onclick="zeigeSeite('gewicht')">⬅ Zurück</button>
  </div>

  <div id="zeit" class="hidden">
    <h3>Schusszeit</h3>
    <input type="time" id="inputZeit">
    <button onclick="nextDatum()">Weiter</button>
    <button onclick="zeigeSeite('ort')">⬅ Zurück</button>
  </div>

  <div id="datum" class="hidden">
    <h3>Eingelagert Datum</h3>
    <input type="date" id="inputDatum">
    <button onclick="nextVerwendung()">Weiter</button>
    <button onclick="zeigeSeite('zeit')">⬅ Zurück</button>
  </div>

  <div id="verwendung" class="hidden">
    <h3>Verwendung</h3>
    <button onclick="finish('Eigengebrauch')">Eigengebrauch</button>
    <button onclick="finish('Verkauf')">Verkauf</button>
    <button onclick="zeigeSeite('datum')">⬅ Zurück</button>
  </div>

</div>

<!-- KARTEN MODAL -->
<div id="mapOverlay" class="popup-overlay hidden"></div>
<div id="mapContainer" class="hidden">
  <div id="map"></div>
  <button id="saveCoordsBtn" onclick="closeMapPicker()" style="margin-top:10px;">Ort übernehmen & Schließen</button>
</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let map, marker;

// Gewicht-Dropdown füllen
const weightSelect = document.getElementById("inputGewicht");
for(let i=1; i<=150; i++){
  let opt = document.createElement("option");
  opt.value = i; opt.text = i + " kg";
  weightSelect.appendChild(opt);
}

// NAVIGATION
function zeigeSeite(id){
  document.querySelectorAll(".container > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function neuerEintrag(){ e = {}; zeigeSeite('name'); }

function speichern(){ localStorage.setItem("daten", JSON.stringify(daten)); }

// KARTEN LOGIK
function initMap() {
  if (map) return;
  // Fokus auf Prad am Stilfserjoch
  map = L.map('map').setView([46.617, 10.592], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  map.on('click', function(ev) {
    if (marker) map.removeLayer(marker);
    marker = L.marker(ev.latlng).addTo(map);
    e.coords = ev.latlng; // lat & lng speichern
    e.ort = "Karte 📍";
  });
}

function openMapPicker() {
  document.getElementById('mapOverlay').classList.remove('hidden');
  document.getElementById('mapContainer').classList.remove('hidden');
  initMap();
  setTimeout(() => map.invalidateSize(), 200);
}

function closeMapPicker() {
  document.getElementById('mapOverlay').classList.add('hidden');
  document.getElementById('mapContainer').classList.add('hidden');
  if(e.coords) zeigeSeite('zeit');
}

function viewOnMap(lat, lng) {
  openMapPicker();
  map.setView([lat, lng], 16);
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map);
  // Button-Text ändern zum Anschauen
  document.getElementById('saveCoordsBtn').innerText = "Schließen";
}

// FORMULAR LOGIK
function nextWild(){
  let v = document.getElementById("inputName").value.trim();
  if(!v) return alert("Bitte Name eingeben!");
  e.name = v; zeigeSeite("wild");
}

function setWild(w){ e.wildart = w; e.wild = ""; zeigeSeite("gewicht"); }
function setWildDetail(a, d){ e.wildart = a; e.wild = d; zeigeSeite("gewicht"); }
function setAndere(){
  let v = document.getElementById("andereInput").value.trim();
  if(!v) return alert("Art?");
  e.wildart = v; e.wild = ""; zeigeSeite("gewicht");
}

function nextOrt(){ e.gewicht = weightSelect.value; zeigeSeite("ort"); }
function setOrt(o){ e.ort = o; delete e.coords; zeigeSeite("zeit"); }
function zeigeAndereOrt(){ document.getElementById("andereOrtBox").classList.remove("hidden"); }
function setAndereOrt(){
  let v = document.getElementById("inputOrt").value.trim();
  if(!v) return alert("Ort?");
  e.ort = v; delete e.coords; zeigeSeite("zeit");
}

function nextDatum(){
  let v = document.getElementById("inputZeit").value;
  if(!v) return alert("Zeit?");
  e.zeit = v; zeigeSeite("datum");
}

function nextVerwendung(){
  let v = document.getElementById("inputDatum").value;
  if(!v) return alert("Datum?");
  e.datum = v; zeigeSeite("verwendung");
}

function finish(v){
  e.verwendung = v;
  e.entnommen = "";
  e.abfall = null;
  daten.push(e);
  speichern(); anzeigen();
  zeigeSeite("revier");
}

function setEntnommen(i, val){
  daten[i].entnommen = val;
  speichern(); anzeigen();
}

function handleAbfall(i){
  if(confirm("Wurde der Abfall vorschriftsmäßig entsorgt?")){
    daten[i].abfall = true;
  } else {
    daten[i].abfall = false;
  }
  speichern(); anzeigen();
}

function anzeigen(){
  let html = `<tr>
    <th>Erleger</th><th>Wildart</th><th>Details</th><th>kg</th>
    <th>Ort</th><th>Zeit</th><th>Datum</th><th>Verwendung</th>
    <th>Entnahme</th><th>Abfall</th>
  </tr>`;

  daten.forEach((d, i) => {
    let ortCell = d.coords 
      ? `<span class="map-link" onclick="viewOnMap(${d.coords.lat}, ${d.coords.lng})">📍 Karte</span>` 
      : (d.ort || "-");

    let entn = d.entnommen 
      ? `<div class="entnommen-done">${d.entnommen}</div>`
      : `<input type="date" onchange="setEntnommen(${i}, this.value)" class="entnommen-btn">`;

    let abfClass = d.abfall === true ? "abfall-ja" : (d.abfall === false ? "abfall-nein" : "abfall-grau");
    let abfText = d.abfall === true ? "JA" : (d.abfall === false ? "NEIN" : "Klick");

    html += `<tr>
      <td>${d.name}</td><td>${d.wildart}</td><td>${d.wild}</td><td>${d.gewicht}</td>
      <td>${ortCell}</td><td>${d.zeit}</td><td>${d.datum}</td><td>${d.verwendung}</td>
      <td>${entn}</td>
      <td><button class="abfall-btn ${abfClass}" onclick="handleAbfall(${i})">${abfText}</button></td>
    </tr>`;
  });
  document.getElementById("tabelle").innerHTML = html;
}

// App starten
anzeigen();
</script>
</body>
</html>
