<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container {
  background:white;
  padding:20px;
  border-radius:15px;
  width:100%;
  max-width:1000px;
}

.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.table-wrapper {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.abfall-btn {
  background:blue;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.abfall-box {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  width:300px;
}

.abfall-box button {
  width:100%;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div>Zahlencode: 1024</div>

  <div class="topbar">
    <button onclick="zeigeSeite('revier')">Revier</button>
  </div>
</div>

<div id="revier" class="hidden">
  <div class="topbar">
    <button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <div class="table-wrapper">
    <table id="tabelle"></table>
  </div>
</div>

<!-- Eingabe -->
<div id="name" class="hidden">
  <h3>Name</h3>
  <input id="inputName">
  <button onclick="nextWild()">Weiter</button>
</div>

<div id="wild" class="hidden">
  <h3>Wildart</h3>
  <button onclick="setWild('Rehwild')">Rehwild</button>
  <button onclick="setWild('Rotwild')">Rotwild</button>
  <button onclick="zeigeSeite('gams')">Gamswild</button>
  <button onclick="setWild('Wildschwein')">Wildschwein</button>
  <button onclick="setWild('Hase')">Hase</button>
  <button onclick="zeigeSeite('andere')">Andere</button>
</div>

<div id="gams" class="hidden">
  <h3>Gamswild</h3>
  <button onclick="setWildDetail('Gamswild','Bock')">Bock</button>
  <button onclick="setWildDetail('Gamswild','Geiß')">Geiß</button>
  <button onclick="setWildDetail('Gamswild','Jahrling')">Jahrling</button>
  <button onclick="setWildDetail('Gamswild','Kitz')">Kitz</button>
</div>

<div id="andere" class="hidden">
  <input id="andereInput">
  <button onclick="setAndere()">Weiter</button>
</div>

<div id="gewicht" class="hidden">
  <input id="inputGewicht" type="number">
  <button onclick="nextOrt()">Weiter</button>
</div>

<div id="ort" class="hidden">
  <input id="inputOrt">
  <button onclick="nextZeit()">Weiter</button>
</div>

<div id="zeit" class="hidden">
  <input type="time" id="inputZeit">
  <button onclick="nextDatum()">Weiter</button>
</div>

<div id="datum" class="hidden">
  <input type="date" id="inputDatum">
  <button onclick="finish()">Fertig</button>
</div>

<!-- Abfall Popup -->
<div id="abfallBox" class="abfall-box hidden">
  <p><b>ACHTUNG!</b><br>
  Der Dienst der Abfallentsorgung durch das Revier ist nur in der Zeit der Parkjagd aufrecht.<br>
  Kosten: 5€</p>

  <button onclick="setAbfall('ja')">Ja</button>
  <button onclick="setAbfall('nein')">Nein</button>
</div>

</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let currentIndex = null;

function speichern(){ localStorage.setItem("daten", JSON.stringify(daten)); }

function zeigeSeite(id){
  document.querySelectorAll("div[id]").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function nextWild(){
  e.name=inputName.value;
  zeigeSeite("wild");
}

function setWild(w){
  e.wildart=w;
  e.wilddetail="";
  zeigeSeite("gewicht");
}

function setWildDetail(w,detail){
  e.wildart=w;
  e.wilddetail=detail;
  zeigeSeite("gewicht");
}

function setAndere(){
  e.wildart=andereInput.value;
  e.wilddetail="";
  zeigeSeite("gewicht");
}

function nextOrt(){
  e.gewicht=inputGewicht.value;
  zeigeSeite("ort");
}

function nextZeit(){
  e.ort=inputOrt.value;
  zeigeSeite("zeit");
}

function nextDatum(){
  e.zeit=inputZeit.value;
  zeigeSeite("datum");
}

function finish(){
  e.datum=inputDatum.value;
  e.abfall=null;
  daten.push(e);
  speichern();
  anzeigen();
  e={};
  zeigeSeite("revier");
}

function openAbfall(i){
  currentIndex=i;
  document.getElementById("abfallBox").classList.remove("hidden");
}

function setAbfall(val){
  daten[currentIndex].abfall=val;
  speichern();
  anzeigen();
  document.getElementById("abfallBox").classList.add("hidden");
}

function anzeigen(){
  let t=document.getElementById("tabelle");
  t.innerHTML=`
  <tr>
  <th>Name</th>
  <th>Wildart</th>
  <th>kg</th>
  <th>Ort</th>
  <th>Zeit</th>
  <th>Datum</th>
  <th>Abfall</th>
  </tr>`;

  daten.forEach((d,i)=>{
    let r=t.insertRow();

    r.insertCell(0).innerText=d.name;
    r.insertCell(1).innerText=d.wilddetail 
      ? d.wildart+"; "+d.wilddetail 
      : d.wildart;
    r.insertCell(2).innerText=d.gewicht;
    r.insertCell(3).innerText=d.ort;
    r.insertCell(4).innerText=d.zeit;
    r.insertCell(5).innerText=d.datum;

    let ab=r.insertCell(6);
    if(d.abfall===null){
      ab.innerHTML=`<span class="abfall-btn" onclick="openAbfall(${i})">+</span>`;
    } else {
      ab.innerText=d.abfall;
    }
  });
}

anzeigen();
</script>

</body>
</html>
