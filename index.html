<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abschussliste</title>

  <!-- Für Handy -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #2e7d32;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
    }

    .info {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    img {
      width: 200px;
      border-radius: 15px;
      margin: 15px 0;
    }

    .button-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .button-container button {
      flex: 1;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div class="info">Zahlencode: 1024</div>

  <!-- LOGO -->
  <img src="491438944_10226782024328158_4391837002889702168_n.jpg" alt="Logo">

  <!-- BUTTONS NEBENEINANDER -->
  <div class="button-container">
    <button onclick="alert('Park gewählt')">Park</button>
    <button onclick="alert('Revier gewählt')">Revier</button>
  </div>

</div>

</body>
</html>
