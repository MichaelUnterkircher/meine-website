<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}

.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}

.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:850px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

/* Entnommen */
.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done {
  background:#e8f5e9;
}

/* Abfall */
.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja {
  background:#4caf50;
  color:white;
  cursor:pointer;
}

.abfall-nein {
  background:#f44336;
  color:white;
  cursor:pointer;
}

.abfall-grau {
  background:#ccc;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div>Zahlencode: 1024</div>

  <img src="491438944_10226782024328158_4391837002889702168_n.jpg" style="width:180px;display:block;margin:auto;">

  <div class="topbar">
    <button onclick="zeigeSeite('park')">Park</button>
    <button onclick="zeigeSeite('revier')">Revier</button>
  </div>
</div>

<!-- PARK -->
<div id="park" class="hidden">
  <h2>Park</h2>
  <p>noch nicht aktiv</p>
  <button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<!-- REVIER -->
<div id="revier" class="hidden">
  <div class="topbar">
    <button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <div class="table-wrapper">
    <table id="tabelle"></table>
  </div>
</div>

<!-- Eingabeseiten bleiben gleich -->
<div id="name" class="hidden">
  <h3>Name Erleger</h3>
  <input id="inputName">
  <button onclick="nextWild()">Weiter</button>
  <button onclick="zeigeSeite('revier')">⬅ Zurück</button>
</div>

<div id="wild" class="hidden">
  <h3>Wildart</h3>
  <button onclick="zeigeSeite('reh')">Reh</button>
  <button onclick="zeigeSeite('hirsch')">Hirsch</button>
  <button onclick="setWild('Gams')">Gams</button>
  <button onclick="setWild('Wildschwein')">Wildschwein</button>
  <button onclick="setWild('Hase')">Hase</button>
  <button onclick="zeigeSeite('andere')">Andere</button>
  <button onclick="zeigeSeite('name')">⬅ Zurück</button>
</div>

<div id="reh" class="hidden">
  <h3>Rehwild</h3>
  <button onclick="setWild('T-Bock')">T-Bock</button>
  <button onclick="setWild('J-Bock')">J-Bock</button>
  <button onclick="setWild('Geiß')">Geiß</button>
  <button onclick="setWild('Schmalgeiß')">Schmalgeiß</button>
  <button onclick="setWild('Kitz')">Kitz</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="hirsch" class="hidden">
  <h3>Rotwild</h3>
  <button onclick="setWild('T-Hirsch')">T-Hirsch</button>
  <button onclick="setWild('J-Hirsch')">J-Hirsch</button>
  <button onclick="setWild('Tier')">Tier</button>
  <button onclick="setWild('Schmaltier')">Schmaltier</button>
  <button onclick="setWild('Kalb')">Kalb</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="andere" class="hidden">
  <h3>Andere Wildart</h3>
  <input id="andereInput">
  <button onclick="setAndere()">Weiter</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="gewicht" class="hidden">
  <h3>Gewicht (kg)</h3>
  <input id="inputGewicht" type="number">
  <button onclick="nextOrt()">Weiter</button>
  <button onclick="zeigeSeite('wild')">⬅ Zurück</button>
</div>

<div id="ort" class="hidden">
  <h3>Örtlichkeit</h3>
  <input id="inputOrt">
  <button onclick="nextZeit()">Weiter</button>
  <button onclick="zeigeSeite('gewicht')">⬅ Zurück</button>
</div>

<div id="zeit" class="hidden">
  <h3>Schusszeit</h3>
  <input type="time" id="inputZeit">
  <button onclick="nextDatum()">Weiter</button>
  <button onclick="zeigeSeite('ort')">⬅ Zurück</button>
</div>

<div id="datum" class="hidden">
  <h3>Eingelagert Datum</h3>
  <input type="date" id="inputDatum">
  <button onclick="nextVerwendung()">Weiter</button>
  <button onclick="zeigeSeite('zeit')">⬅ Zurück</button>
</div>

<div id="verwendung" class="hidden">
  <h3>Verwendung</h3>
  <button onclick="finish('Eigengebrauch')">Eigengebrauch</button>
  <button onclick="finish('Verkauf')">Verkauf</button>
  <button onclick="zeigeSeite('datum')">⬅ Zurück</button>
</div>

</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};

function speichern(){ localStorage.setItem("daten", JSON.stringify(daten)); }

function zeigeSeite(id){
  document.querySelectorAll("div[id]").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function nextWild(){
  let v=inputName.value.trim();
  if(!v) return alert("Bitte Name eingeben!");
  e.name=v; zeigeSeite("wild");
}

function setWild(w){ e.wild=w; zeigeSeite("gewicht"); }

function setAndere(){
  let v=andereInput.value.trim();
  if(!v) return alert("Bitte Wildart eingeben!");
  e.wild=v; zeigeSeite("gewicht");
}

function nextOrt(){
  let v=inputGewicht.value;
  if(!v||v<=0) return alert("Bitte gültiges Gewicht!");
  e.gewicht=v; zeigeSeite("ort");
}

function nextZeit(){
  let v=inputOrt.value.trim();
  if(!v) return alert("Bitte Ort eingeben!");
  e.ort=v; zeigeSeite("zeit");
}

function nextDatum(){
  let v=inputZeit.value;
  if(!v) return alert("Bitte Schusszeit!");
  e.zeit=v; zeigeSeite("datum");
}

function nextVerwendung(){
  let v=inputDatum.value;
  if(!v) return alert("Bitte Datum!");
  e.datum=v; zeigeSeite("verwendung");
}

function finish(v){
  e.verwendung=v;
  e.entnommen="";
  e.abfall=null;
  daten.push(e);
  speichern(); anzeigen(); e={};
  zeigeSeite("revier");
}

function openDate(i){
  document.getElementById("date"+i).showPicker();
}

function setEntnommen(i,val){
  if(val){ daten[i].entnommen=val; speichern(); anzeigen(); }
}

/* ABFALL LOGIK */
function handleAbfall(i){
  let benutzt=confirm("Abfallzelle benutzt?");
  if(!benutzt){
    daten[i].abfall="nein";
  } else {
    let bezahlt=confirm("Bezahlt?");
    daten[i].abfall = bezahlt ? "bezahlt" : "offen";
  }
  speichern(); anzeigen();
}

function toggleBezahlt(i){
  if(daten[i].abfall==="offen"){
    if(confirm("Jetzt als bezahlt markieren?")){
      daten[i].abfall="bezahlt";
      speichern(); anzeigen();
    }
  }
}

function anzeigen(){
  let t=document.getElementById("tabelle");
  t.innerHTML=`
  <tr>
  <th>Name</th><th>Wild</th><th>kg</th><th>Ort</th>
  <th>Schusszeit</th><th>Eingelagert</th><th>Entnommen</th>
  <th>Verwendung</th><th>Abfall</th></tr>`;

  daten.forEach((d,i)=>{
    let r=t.insertRow();
    r.insertCell(0).innerText=d.name;
    r.insertCell(1).innerText=d.wild;
    r.insertCell(2).innerText=d.gewicht;
    r.insertCell(3).innerText=d.ort;
    r.insertCell(4).innerText=d.zeit;
    r.insertCell(5).innerText=d.datum;

    let ent=r.insertCell(6);
    if(!d.entnommen){
      ent.innerHTML=`<span class="entnommen-btn" onclick="openDate(${i})">+</span>
      <input type="date" id="date${i}" style="display:none" onchange="setEntnommen(${i},this.value)">`;
    } else {
      ent.innerText=d.entnommen;
      ent.className="entnommen-done";
    }

    r.insertCell(7).innerText=d.verwendung;

    let ab=r.insertCell(8);

    if(d.abfall===null){
      ab.innerHTML=`<span class="abfall-btn" onclick="handleAbfall(${i})">+</span>`;
    }
    else if(d.abfall==="nein"){
      ab.innerText="Nein";
      ab.className="abfall-grau";
    }
    else if(d.abfall==="bezahlt"){
      ab.innerText="Ja";
      ab.className="abfall-ja";
    }
    else if(d.abfall==="offen"){
      ab.innerText="Nein";
      ab.className="abfall-nein";
      ab.onclick=()=>toggleBezahlt(i);
    }
  });
}

anzeigen();
</script>

</body>
</html>
