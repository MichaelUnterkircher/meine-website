<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #2e7d32;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 15px;
  width: 100%;
  max-width: 600px;
}

.hidden { display: none; }

.topbar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.topbar button {
  flex: 1;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2e7d32;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

button:hover {
  background: #1b5e20;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
}

th {
  background: #2e7d32;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div>Zahlencode: 1024</div>

  <div class="topbar">
    <button onclick="zeigeSeite('park')">Park</button>
    <button onclick="zeigeSeite('revier')">Revier</button>
  </div>
</div>

<!-- PARK -->
<div id="park" class="hidden">
  <h2>Park</h2>
  <p>noch nicht aktiv</p>
  <button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<!-- REVIER -->
<div id="revier" class="hidden">

  <div class="topbar">
    <button onclick="zeigeSeite('eingabeName')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <table id="tabelle">
    <tr>
      <th>Name</th>
      <th>Wildart</th>
      <th>Aktion</th>
    </tr>
  </table>

</div>

<!-- NAME -->
<div id="eingabeName" class="hidden">
  <h2>Name Erleger</h2>
  <input type="text" id="name">
  <button onclick="weiterZuWildart()">Weiter</button>
</div>

<!-- WILDART -->
<div id="eingabeWildart" class="hidden">
  <h2>Wildart</h2>

  <button onclick="setWild('Reh')">Reh</button>
  <button onclick="setWild('Hirsch')">Hirsch</button>
  <button onclick="setWild('Gams')">Gams</button>
  <button onclick="setWild('Fuchs')">Fuchs</button>
</div>

</div>

<script>
let eintraege = JSON.parse(localStorage.getItem("daten")) || [];
let aktuellerIndex = -1;
let eintrag = {};

function speichernLocal() {
  localStorage.setItem("daten", JSON.stringify(eintraege));
}

function zeigeSeite(seite) {
  let seiten = ["start","park","revier","eingabeName","eingabeWildart"];
  seiten.forEach(s => document.getElementById(s).classList.add("hidden"));
  document.getElementById(seite).classList.remove("hidden");
}

function weiterZuWildart() {
  let name = document.getElementById("name").value;
  if(name === "") {
    alert("Bitte Name eingeben");
    return;
  }

  eintrag.name = name;
  zeigeSeite("eingabeWildart");
}

function setWild(wildart) {
  eintrag.wildart = wildart;

  if(aktuellerIndex >= 0) {
    eintraege[aktuellerIndex] = eintrag;
    aktuellerIndex = -1;
  } else {
    eintraege.push(eintrag);
  }

  speichernLocal();
  anzeigen();

  eintrag = {};
  document.getElementById("name").value = "";

  zeigeSeite("revier");
}

function anzeigen() {
  let tabelle = document.getElementById("tabelle");

  // alte Zeilen löschen
  tabelle.innerHTML = `
    <tr>
      <th>Name</th>
      <th>Wildart</th>
      <th>Aktion</th>
    </tr>
  `;

  eintraege.forEach((e, index) => {
    let row = tabelle.insertRow();

    row.insertCell(0).innerText = e.name;
    row.insertCell(1).innerText = e.wildart;

    let aktion = row.insertCell(2);
    aktion.innerHTML = `
      <button onclick="bearbeiten(${index})">✏️</button>
      <button onclick="loeschen(${index})">❌</button>
    `;
  });
}

function loeschen(index) {
  eintraege.splice(index, 1);
  speichernLocal();
  anzeigen();
}

function bearbeiten(index) {
  aktuellerIndex = index;
  eintrag = eintraege[index];

  document.getElementById("name").value = eintrag.name;

  zeigeSeite("eingabeName");
}

// beim Laden anzeigen
anzeigen();
</script>

</body>
</html>
</script>

</body>
</html>
