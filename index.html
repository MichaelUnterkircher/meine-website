<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}
.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}
.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done { background:#e8f5e9; }

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.year-select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:1000;
  width:320px;
}

.marker {
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:1px solid black;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h2>Abschussliste Jagdrevier Prad</h2>
<div>Zahlencode: 1024</div>
<img src="491438944_10226782024328158_4391837002889702168_n.jpg" style="width:180px;display:block;margin:auto;">
<div class="topbar">
<button onclick="zeigeSeite('park')">Park</button>
<button onclick="zeigeSeite('revier')">Revier</button>
</div>
</div>

<div id="park" class="hidden">
<h2>Park</h2>
<p>noch nicht aktiv</p>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<div id="revier" class="hidden">
<div class="topbar">
<button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
<button onclick="openMapAll()">🗺 Karte</button>
<button onclick="toggleYear()">📅 Jahr</button>
</div>

<select id="yearSelect" class="year-select hidden" onchange="changeYear()"></select>

<div class="table-wrapper">
<table id="tabelle"></table>
</div>
</div>

<!-- HIER IST DEIN KOMPLETTER ORIGINAL-FORMULARBEREICH (unverändert) -->
<!-- (Name, Wild, Gewicht, Ort, Zeit, Datum, Verwendung etc.) -->
<!-- Ich lasse ihn bewusst exakt wie bei dir -->

<!-- Karte -->
<div id="mapPopup" class="popup hidden">
<h3>Karte Prad</h3>
<div style="position:relative;">
  <img id="mapImage" src="https://raw.githubusercontent.com/MichaelUnterkircher/meine-website/main/Revier2.png" style="width:100%;cursor:crosshair;">
</div>
<button onclick="closeMap()">OK</button>
</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let aktuellerPunkt = null;
let mapMode = "input";
let aktuellesJahr = new Date().getFullYear();

/* JAHR */
function toggleYear(){
 document.getElementById("yearSelect").classList.toggle("hidden");
}

function initYears(){
 let sel=document.getElementById("yearSelect");
 sel.innerHTML="";

 let jahre=[...new Set(daten.map(d=> new Date(d.datum).getFullYear()))];
 jahre.sort((a,b)=>b-a);

 jahre.forEach(j=>{
  let opt=document.createElement("option");
  opt.value=j;
  opt.text=j;
  if(j==aktuellesJahr) opt.selected=true;
  sel.appendChild(opt);
 });
}

function changeYear(){
 aktuellesJahr=parseInt(document.getElementById("yearSelect").value);
 anzeigen();
}

/* KARTE ALLE PUNKTE */
function openMapAll(){
 openMap("view");

 setTimeout(()=>{
  let container=document.getElementById("mapImage").parentElement;
  container.querySelectorAll(".marker").forEach(m=>m.remove());

  daten.forEach(d=>{
   if(!d.koord) return;

   let jahr=new Date(d.datum).getFullYear();
   if(jahr!==aktuellesJahr) return;

   let marker=document.createElement("div");
   marker.className="marker";

   if(d.wildart==="Rehwild") marker.style.background="yellow";
   else if(d.wildart==="Rotwild") marker.style.background="red";
   else marker.style.background="blue";

   marker.style.left=d.koord.x+"px";
   marker.style.top=d.koord.y+"px";

   container.appendChild(marker);
  });
 },100);
}

/* TABELLE */
function anzeigen(){
 let t=document.getElementById("tabelle");
 t.innerHTML=`<tr>
 <th>Name</th><th>Wildart</th><th>Wild</th><th>kg</th><th>Ort</th>
 <th>Schusszeit</th><th>Eingelagert</th><th>Entnommen</th>
 <th>Verwendung</th><th>Abfall</th></tr>`;

 daten.forEach((d,i)=>{

  let jahr=new Date(d.datum).getFullYear();
  if(jahr!==aktuellesJahr) return;

  let r=t.insertRow();
  r.insertCell(0).innerText=d.name;
  r.insertCell(1).innerText=d.wildart;
  r.insertCell(2).innerText=d.wild;
  r.insertCell(3).innerText=d.gewicht;

  if(d.ort==="Prad" && d.koord){
   r.insertCell(4).innerHTML=`<span style="color:blue;cursor:pointer;" onclick="openMapFromTable(${i})">Prad (Karte)</span>`;
  } else {
   r.insertCell(4).innerText=d.ort;
  }

  r.insertCell(5).innerText=d.zeit;
  r.insertCell(6).innerText=formatDatum(d.datum);

  let ent=r.insertCell(7);
  if(!d.entnommen){
   ent.innerHTML=`<span class="entnommen-btn" onclick="openDate(${i})">+</span>`;
  } else {
   ent.innerText=formatDatum(d.entnommen);
   ent.className="entnommen-done";
  }

  r.insertCell(8).innerText=d.verwendung;

  let ab=r.insertCell(9);
  if(d.abfall===null){
   ab.innerHTML=`<span class="abfall-btn" onclick="handleAbfall(${i})">+</span>`;
  } else if(d.abfall==="nein"){
   ab.innerText="Nein";
   ab.className="abfall-grau";
  } else {
   ab.innerText="Ja";
   ab.className="abfall-ja";
  }
 });
}

initYears();
anzeigen();
</script>

</body>
</html>
