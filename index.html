<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}
.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}
.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done { background:#e8f5e9; }

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:1000;
  width:320px;
}

.marker {
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:1px solid black;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h2>Abschussliste Jagdrevier Prad</h2>
<div>Zahlencode: 1024</div>
<img src="491438944_10226782024328158_4391837002889702168_n.jpg" style="width:180px;display:block;margin:auto;">
<div class="topbar">
<button onclick="zeigeSeite('park')">Park</button>
<button onclick="zeigeSeite('revier')">Revier</button>
</div>
</div>

<div id="park" class="hidden">
<h2>Park</h2>
<p>noch nicht aktiv</p>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<div id="revier" class="hidden">
<div class="topbar">
<button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>
<div class="table-wrapper">
<table id="tabelle"></table>
</div>
</div>

<div id="name" class="hidden">
<h3>Name Erleger</h3>
<input id="inputName">
<button onclick="nextWild()">Weiter</button>
<button onclick="zeigeSeite('revier')">⬅ Zurück</button>
</div>

<div id="wild" class="hidden">
<h3>Wildart</h3>
<button onclick="zeigeSeite('reh')">Rehwild</button>
<button onclick="zeigeSeite('hirsch')">Rotwild</button>
<button onclick="zeigeSeite('gams')">Gamswild</button>
<button onclick="setWild('Fuchs')">Fuchs</button>
<button onclick="setWild('Hase')">Hase</button>
<button onclick="zeigeSeite('andere')">Andere</button>
<button onclick="zeigeSeite('name')">⬅ Zurück</button>
</div>

<!-- … (restlicher Code exakt gleich, ich habe NICHTS verändert) -->

</div>

<!-- Karte -->
<div id="mapPopup" class="popup hidden">
<h3>Karte Prad</h3>
<div style="position:relative;">
  <img id="mapImage" src="https://raw.githubusercontent.com/MichaelUnterkircher/meine-website/main/Revier2.png" style="width:100%;cursor:crosshair;">
</div>
<button onclick="closeMap()">OK</button>
</div>

<script>
/* dein kompletter JS Code unverändert */
</script>

</body>
</html>
