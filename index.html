<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}

.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}

.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
}

.entnommen-done { background:#e8f5e9; }

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* Karte */
.map-container {
  position:relative;
}

#mapImg {
  width:100%;
  border-radius:10px;
}

.point {
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="container">

<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>

  <div class="topbar">
    <button onclick="zeigeSeite('park')">Park</button>
    <button onclick="zeigeSeite('Revier')">Revier</button>
  </div>
</div>

<div id="park" class="hidden">
  <button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<!-- ✅ HIER groß geschrieben -->
<div id="Revier" class="hidden">
  <div class="topbar">
    <button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <div class="table-wrapper">
    <table id="tabelle"></table>
  </div>
</div>

<div id="name" class="hidden">
  <input id="inputName" placeholder="Name">
  <button onclick="nextWild()">Weiter</button>
</div>

<div id="wild" class="hidden">
  <button onclick="setWildDetail('Rehwild','')">Rehwild</button>
  <button onclick="setWildDetail('Rotwild','')">Rotwild</button>
  <button onclick="setWildDetail('Gamswild','')">Gamswild</button>
</div>

<div id="gewicht" class="hidden">
  <select id="inputGewicht"></select>
  <button onclick="nextOrt()">Weiter</button>
</div>

<div id="ort" class="hidden">
  <button onclick="openMap()">📍 Prad (Karte)</button>
</div>

<div id="map" class="hidden">
  <h3>Punkt setzen</h3>

  <div class="map-container">
    <img id="mapImg" src="karte.png">
  </div>

  <button onclick="confirmPoint()">Speichern</button>
</div>

</div>

<script>
let daten = [];
let e = {};
let clickX = null;
let clickY = null;

for(let i=0;i<=200;i++){
  let opt=document.createElement("option");
  opt.value=i;
  opt.text=i+" kg";
  inputGewicht.appendChild(opt);
}

function zeigeSeite(id){
  document.querySelectorAll("div[id]").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function nextWild(){
  e.name=inputName.value;
  zeigeSeite("wild");
}

function setWildDetail(a,d){
  e.wildart=a;
  zeigeSeite("gewicht");
}

function nextOrt(){
  e.gewicht=inputGewicht.value;
  zeigeSeite("ort");
}

function openMap(){
  zeigeSeite("map");
}

mapImg.onclick=function(ev){
  let rect=this.getBoundingClientRect();
  clickX=(ev.clientX-rect.left)/rect.width;
  clickY=(ev.clientY-rect.top)/rect.height;

  document.querySelectorAll(".point").forEach(p=>p.remove());

  let p=document.createElement("div");
  p.className="point";

  if(e.wildart==="Rehwild") p.style.background="green";
  else if(e.wildart==="Rotwild") p.style.background="red";
  else p.style.background="blue";

  p.style.left=(clickX*100)+"%";
  p.style.top=(clickY*100)+"%";

  document.querySelector(".map-container").appendChild(p);
};

function confirmPoint(){
  e.mapX=clickX;
  e.mapY=clickY;

  daten.push(e);
  anzeigen();

  e={};
  zeigeSeite("Revier"); /* ✅ wichtig */
}

function anzeigen(){
  let t=document.getElementById("tabelle");
  t.innerHTML="<tr><th>Name</th><th>Wildart</th></tr>";

  daten.forEach(d=>{
    let r=t.insertRow();
    r.insertCell(0).innerText=d.name;
    r.insertCell(1).innerText=d.wildart;
  });
}

anzeigen();
</script>

</body>
</html>
