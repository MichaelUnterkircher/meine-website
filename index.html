<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Abschussliste 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2e7d32; /* GRÜN */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 400px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    img {
      width: 250px;
      border-radius: 15px;
      margin-top: 15px;
    }

    <button onclick="zeigeText()" style="
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:18px;
  cursor:pointer;
">
  Revier
</button>

<p id="text"></p>
      background: #1b5e20;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Abschussliste Jagdrevier Prad 2026</h1>

    <img src="491438944_10226782024328158_4391837002889702168_n.jpg" alt="Bild">

    <br>

    <button onclick="zeigeText()">Revier</button>

    <p id="text"></p>
  </div>

  <script>
    function zeigeText() {
      document.getElementById("text").innerText = "Informationen zum Revier werden hier angezeigt.";
    }
  </script>

</body>
</html>
