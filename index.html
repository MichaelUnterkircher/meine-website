<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}
.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}
.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done { background:#e8f5e9; }

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:1000;
  width:320px;
}

/* 🔥 Marker größer gemacht */
.marker {
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:2px solid black;
}

/* Hinweis */
.map-hint{
  font-size:14px;
  margin-bottom:5px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h2>Abschussliste Jagdrevier Prad</h2>
<div>Zahlencode: 1024</div>
<img src="491438944_10226782024328158_4391837002889702168_n.jpg" style="width:180px;display:block;margin:auto;">
<div class="topbar">
<button onclick="zeigeSeite('park')">Park</button>
<button onclick="zeigeSeite('revier')">Revier</button>
</div>
</div>

<div id="park" class="hidden">
<h2>Park</h2>
<p>noch nicht aktiv</p>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<div id="revier" class="hidden">
<div class="topbar">
<button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
<button onclick="openMapAll()">🗺️ Karte</button>
<button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>
<div class="table-wrapper">
<table id="tabelle"></table>
</div>
</div>

<!-- ... ALLE DEINE ORIGINAL SEITEN BLEIBEN UNVERÄNDERT ... -->

<!-- Karte -->
<div id="mapPopup" class="popup hidden">
<h3>Karte Prad</h3>
<div id="mapHint" class="map-hint"></div>
<div style="position:relative;">
  <img id="mapImage" src="https://raw.githubusercontent.com/MichaelUnterkircher/meine-website/main/Revier2.png" style="width:100%;cursor:crosshair;">
</div>
<button onclick="closeMap()">OK</button>
</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let aktuellerPunkt = null;
let mapMode = "input";

/* Karte öffnen */
function openMap(mode="input"){
 mapMode = mode;

 let popup=document.getElementById("mapPopup");
 popup.classList.remove("hidden");

 let hint=document.getElementById("mapHint");

 popup.querySelectorAll(".marker").forEach(m=>m.remove());

 if(mode==="input"){
  hint.innerText="Bitte Punkt auf der Karte setzen";
 } else {
  hint.innerText="";
 }

 if(e.koord){
  drawMarker(e.koord.x,e.koord.y,e.wildart);
 }
}

/* Alle Punkte */
function openMapAll(){
 mapMode="view";

 let popup=document.getElementById("mapPopup");
 popup.classList.remove("hidden");

 document.getElementById("mapHint").innerText="";

 popup.querySelectorAll(".marker").forEach(m=>m.remove());

 daten.forEach(d=>{
  if(d.koord){
   drawMarker(d.koord.x,d.koord.y,d.wildart);
  }
 });
}

/* Marker zeichnen */
function drawMarker(x,y,wildart){
 let container=document.getElementById("mapImage").parentElement;

 let marker=document.createElement("div");
 marker.className="marker";

 if(wildart==="Rehwild"){
  marker.style.background="yellow";
 } else if(wildart==="Rotwild"){
  marker.style.background="red";
 } else {
  marker.style.background="blue";
 }

 marker.style.left=x+"px";
 marker.style.top=y+"px";

 container.appendChild(marker);
}

/* Klick -> nur 1 Marker */
document.getElementById("mapImage").addEventListener("click",function(ev){
 if(mapMode==="view") return;

 let container=this.parentElement;
 container.querySelectorAll(".marker").forEach(m=>m.remove());

 let rect=this.getBoundingClientRect();
 let x=ev.clientX-rect.left;
 let y=ev.clientY-rect.top;

 aktuellerPunkt={x:Math.round(x),y:Math.round(y)};
 drawMarker(x,y,e.wildart);
});

/* Abfall Fix */
function handleAbfall(i){
 document.querySelectorAll(".popup").forEach(p=>{
  if(p.id!=="mapPopup") p.remove();
 });

 let box=document.createElement("div");
 box.className="popup";
 box.innerHTML=`ACHTUNG!<br><br>
 Abfall nur während Parkjagd<br><br>
 <button onclick="setAbfall(${i},'bezahlt')">Ja</button>
 <button onclick="setAbfall(${i},'nein')">Nein</button>`;
 document.body.appendChild(box);
}

function setAbfall(i,val){
 daten[i].abfall=val;
 localStorage.setItem("daten", JSON.stringify(daten));
 anzeigen();

 document.querySelectorAll(".popup").forEach(p=>{
  if(p.id!=="mapPopup") p.remove();
 });
}
</script>

</body>
</html>
