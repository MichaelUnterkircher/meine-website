<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}

.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}

.hidden { display:none; }

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.topbar button { flex:1; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.entnommen-btn {
  background:red;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.entnommen-done { background:#e8f5e9; }

.abfall-btn {
  background:blue;
  color:white;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
}

.abfall-ja { background:#4caf50; color:white; }
.abfall-nein { background:#f44336; color:white; }
.abfall-grau { background:#ccc; }

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:1000;
  width:320px;
}

.link {
  color:blue;
  text-decoration:underline;
  cursor:pointer;
}

/* 🔥 Karte */
#map {
  height:300px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start">
  <h2>Abschussliste Jagdrevier Prad</h2>
  <div>Zahlencode: 1024</div>

  <img src="491438944_10226782024328158_4391837002889702168_n.jpg" style="width:180px;display:block;margin:auto;">

  <div class="topbar">
    <button onclick="zeigeSeite('park')">Park</button>
    <button onclick="zeigeSeite('revier')">Revier</button>
  </div>
</div>

<div id="park" class="hidden">
  <h2>Park</h2>
  <p>noch nicht aktiv</p>
  <button onclick="zeigeSeite('start')">⬅ Zurück</button>
</div>

<div id="revier" class="hidden">
  <div class="topbar">
    <button onclick="zeigeSeite('name')">➕ Neuer Eintrag</button>
    <button onclick="zeigeSeite('start')">⬅ Zurück</button>
  </div>

  <div class="table-wrapper">
    <table id="tabelle"></table>
  </div>
</div>

<div id="name" class="hidden">
  <h3>Name Erleger</h3>
  <input id="inputName">
  <button onclick="nextWild()">Weiter</button>
  <button onclick="zeigeSeite('revier')">⬅ Zurück</button>
</div>

<div id="wild" class="hidden">
  <h3>Wildart</h3>
  <button onclick="zeigeSeite('reh')">Rehwild</button>
  <button onclick="zeigeSeite('hirsch')">Rotwild</button>
  <button onclick="zeigeSeite('gams')">Gamswild</button>
  <button onclick="setWild('Wildschwein')">Wildschwein</button>
  <button onclick="setWild('Hase')">Hase</button>
  <button onclick="zeigeSeite('andere')">Andere</button>
  <button onclick="zeigeSeite('name')">⬅ Zurück</button>
</div>

<!-- ... alles unverändert ... -->

<div id="ort" class="hidden">
  <h3>Örtlichkeit</h3>
  <button onclick="openMap()">Prad</button>
  <button onclick="zeigeAndereOrt()">Andere</button>

  <div id="andereOrtBox" class="hidden">
    <input id="inputOrt" placeholder="Ort eingeben">
    <button onclick="setAndereOrt()">Weiter</button>
  </div>

  <button onclick="zeigeSeite('gewicht')">⬅ Zurück</button>
</div>

<!-- 🔥 NEUE KARTENSEITE -->
<div id="mapSeite" class="hidden">
  <h3>Ort auswählen</h3>
  <div id="map"></div>
  <button onclick="zeigeSeite('ort')">⬅ Zurück</button>
</div>

<!-- rest unverändert (zeit, datum, verwendung) -->

</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let e = {};
let map, marker;

function openMap(){
  zeigeSeite("mapSeite");

  setTimeout(()=>{
    if(!map){
      map = L.map('map').setView([46.616, 10.583], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      map.on('click', function(ev){
        let lat = ev.latlng.lat;
        let lng = ev.latlng.lng;

        if(marker) map.removeLayer(marker);
        marker = L.marker([lat,lng]).addTo(map);

        e.lat = lat;
        e.lng = lng;
        e.ort = "Koordinaten";

        zeigeSeite("zeit");
      });
    }
  },200);
}

function mapsLink(lat,lng){
  return `https://www.google.com/maps?q=${lat},${lng}`;
}

/* 🔽 WICHTIG: nur ORT Anzeige angepasst */
function anzeigen(){
  let t=document.getElementById("tabelle");
  t.innerHTML=`
  <tr>
  <th>Name</th><th>Wildart</th><th>Wild</th><th>kg</th><th>Ort</th>
  <th>Schusszeit</th><th>Eingelagert</th><th>Entnommen</th>
  <th>Verwendung</th><th>Abfall</th></tr>`;

  daten.forEach((d,i)=>{
    let r=t.insertRow();
    r.insertCell(0).innerText=d.name;
    r.insertCell(1).innerText=d.wildart;
    r.insertCell(2).innerText=d.wild;
    r.insertCell(3).innerText=d.gewicht;

    let ort=r.insertCell(4);
    if(d.lat){
      ort.innerHTML=`<span class="link" onclick="window.open('${mapsLink(d.lat,d.lng)}')">📍 Karte</span>`;
    } else {
      ort.innerText=d.ort;
    }

    r.insertCell(5).innerText=d.zeit;
    r.insertCell(6).innerText=d.datum;
    r.insertCell(7).innerText=d.entnommen;
    r.insertCell(8).innerText=d.verwendung;
    r.insertCell(9).innerText=d.abfall || "";
  });
}

anzeigen();
</script>

</body>
</html>
