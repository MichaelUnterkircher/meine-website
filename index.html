<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Abschussliste</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#2e7d32;
  display:flex;
  justify-content:center;
  padding:10px;
}
.container {
  background:white;
  padding:15px;
  border-radius:15px;
  width:100%;
  max-width:600px;
}
.hidden { display:none; }

.topbar {
  display:flex;
  gap:5px;
  margin-bottom:10px;
}
.topbar button { flex:1; font-size:14px; }

button {
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
}

.table-wrapper { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:950px;
}

th,td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

th {
  background:#2e7d32;
  color:white;
}

.year-select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  z-index:1000;
  width:320px;
}

.marker {
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  transform:translate(-50%,-50%);
  border:1px solid black;
}
</style>
</head>

<body>
<div class="container">

<div id="revier">
<div class="topbar">
<button onclick="zeigeSeite('name')">➕</button>
<button onclick="zeigeSeite('start')">⬅</button>
<button onclick="openMapAll()">🗺</button>
<button onclick="toggleYear()">📅</button>
</div>

<select id="yearSelect" class="year-select hidden" onchange="changeYear()"></select>

<div class="table-wrapper">
<table id="tabelle"></table>
</div>
</div>

<div id="mapPopup" class="popup hidden">
<h3>Karte Prad</h3>
<div style="position:relative;">
<img id="mapImage" src="https://raw.githubusercontent.com/MichaelUnterkircher/meine-website/main/Revier2.png" style="width:100%;cursor:crosshair;">
</div>
<button onclick="closeMap()">OK</button>
</div>

<script>
let daten = JSON.parse(localStorage.getItem("daten")) || [];
let aktuellesJahr = new Date().getFullYear();

/* Jahr Auswahl */
function toggleYear(){
 document.getElementById("yearSelect").classList.toggle("hidden");
}

function initYears(){
 let sel=document.getElementById("yearSelect");
 sel.innerHTML="";

 let jahre=[...new Set(daten.map(d=> new Date(d.datum).getFullYear()))];
 jahre.sort((a,b)=>b-a);

 jahre.forEach(j=>{
  let opt=document.createElement("option");
  opt.value=j;
  opt.text=j;
  if(j==aktuellesJahr) opt.selected=true;
  sel.appendChild(opt);
 });
}

function changeYear(){
 aktuellesJahr=parseInt(document.getElementById("yearSelect").value);
 anzeigen();
}

/* Karte alle Punkte */
function openMapAll(){
 openMap("view");

 setTimeout(()=>{
  let container=document.getElementById("mapImage").parentElement;
  container.querySelectorAll(".marker").forEach(m=>m.remove());

  daten.forEach(d=>{
   if(!d.koord) return;
   let jahr=new Date(d.datum).getFullYear();
   if(jahr!==aktuellesJahr) return;

   let marker=document.createElement("div");
   marker.className="marker";

   if(d.wildart==="Rehwild") marker.style.background="yellow";
   else if(d.wildart==="Rotwild") marker.style.background="red";
   else marker.style.background="blue";

   marker.style.left=d.koord.x+"px";
   marker.style.top=d.koord.y+"px";

   container.appendChild(marker);
  });
 },100);
}

/* Tabelle */
function anzeigen(){
 let t=document.getElementById("tabelle");
 t.innerHTML=`<tr>
 <th>Name</th><th>Wildart</th><th>kg</th><th>Ort</th><th>Datum</th></tr>`;

 daten.forEach(d=>{
  let jahr=new Date(d.datum).getFullYear();
  if(jahr!==aktuellesJahr) return;

  let r=t.insertRow();
  r.insertCell(0).innerText=d.name;
  r.insertCell(1).innerText=d.wildart;
  r.insertCell(2).innerText=d.gewicht;
  r.insertCell(3).innerText=d.ort;
  r.insertCell(4).innerText=d.datum;
 });
}

initYears();
anzeigen();
</script>

</body>
</html>
